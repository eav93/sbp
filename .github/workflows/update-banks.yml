name: Update SBP Banks

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch banks data
        run: node scripts/fetch.js

      - name: Commit and tag if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/banks.json
          if git diff --cached --quiet; then
            echo "No changes, skipping commit"
            exit 0
          fi
          DATE=$(date -u '+%Y-%m-%d')
          git commit -m "chore: update SBP banks data $DATE"
          git tag "data-$DATE"
          git push
          git push origin "data-$DATE"
